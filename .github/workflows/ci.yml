name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: type-check
        run: bun run lint
      # Build BEFORE test: engine-extractor.ts does a load-time
      # `import ... from "../assets/beheld-engine" with { type: "file" }`, so
      # the asset must exist before `bun test` loads that module (self-heal /
      # heal-engine specs). build.sh writes the stub-engine placeholder when no
      # BEHELD_ENGINE_TOKEN is set.
      - name: build (stub engine — no proprietary binary)
        env:
          BEHELD_ENGINE_TOKEN: ""
        run: sh scripts/build.sh
      - name: test
        run: bun test
      - name: smoke
        run: ./dist/beheld --version
