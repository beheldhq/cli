name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: build & publish CLI binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        # bun-version is read from .bun-version

      - run: bun install --frozen-lockfile

      - name: build all targets
        env:
          BEHELD_ENGINE_TOKEN: ${{ secrets.BEHELD_ENGINE_TOKEN }}
          # Pin engine to a known release. Bump when the engine ships a
          # newer version; do not let this drift via "latest".
          BEHELD_ENGINE_VERSION: v0.5.1
        run: |
          set -eu
          mkdir -p dist
          # TODO(darwin-x64): re-enable once beheldhq/engine ships
          # beheld-engine-darwin-x64. The install.sh and fetch-engine
          # currently fail early with an actionable message for that
          # combo.
          for entry in linux:x64 linux:arm64 darwin:arm64; do
            target_os="${entry%:*}"
            target_arch="${entry#*:}"
            echo "==> building beheld-${target_os}-${target_arch}"
            BEHELD_ENGINE_OS="$target_os" \
            BEHELD_ENGINE_ARCH="$target_arch" \
              sh scripts/fetch-engine.sh
            bun build packages/cli/src/index.ts \
              --compile \
              --minify \
              --target="bun-${target_os}-${target_arch}" \
              --outfile "dist/beheld-${target_os}-${target_arch}"
            ( cd dist && \
              sha256sum "beheld-${target_os}-${target_arch}" \
                > "beheld-${target_os}-${target_arch}.sha256" )
          done
          ls -la dist

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/beheld-*
          fail_on_unmatched_files: true
          generate_release_notes: true
