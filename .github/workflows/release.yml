name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            runner: macos-latest
            artifact: beheld-darwin-arm64
          - target: bun-linux-x64
            runner: ubuntu-latest
            artifact: beheld-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: fetch engine binary
        env:
          BEHELD_ENGINE_TOKEN: ${{ secrets.BEHELD_ENGINE_TOKEN }}
        run: sh scripts/fetch-engine.sh
      - name: build
        run: |
          bun build packages/cli/src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.artifact }}
      - name: checksum
        run: cd dist && shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
